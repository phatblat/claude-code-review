# Example consumer workflow. In another repo this would reference the published
# action: `uses: phatblat/claude-code-review@v1`. Here it uses the local action.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./ # or: phatblat/claude-code-review@v1
        with:
          github_token: ${{ env.CCR_GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_version: "2.1.150"
          skip_globs: "src/gen/**,**/*.lock,vendor/**"
          nit_threshold: "0.85"
          max_nits: "5"
          show_full_output: "true"
