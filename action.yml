name: "Claude Code Review"
description: "Generate-then-verify AI code review with line-level, applyable suggestions."
author: "phatblat"
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  github_token:
    description: "GitHub token for posting review comments. Must have pull-requests: write."
    required: true
    default: ${{ github.token }}
  anthropic_api_key:
    description: "Anthropic API key (or configure Bedrock/Vertex/Foundry on the action step instead)."
    required: false
  model:
    description: "Model for the reviewer/verifier subagents."
    required: false
    default: "claude-sonnet-4-6"
  max_turns:
    description: "Max turns for the verification step."
    required: false
    default: "20"
  skip_globs:
    description: "Comma-separated globs to exclude (generated code, lockfiles, vendored)."
    required: false
    default: ""
  important_threshold:
    description: "Min verifier confidence to post an Important finding (0-1)."
    required: false
    default: "0.5"
  nit_threshold:
    description: "Min verifier confidence to post a Nit (0-1)."
    required: false
    default: "0.85"
  max_nits:
    description: "Max nit comments posted inline; the rest are summarized."
    required: false
    default: "5"
  post_pre_existing:
    description: "Post findings the verifier marks as pre-existing."
    required: false
    default: "false"
  show_full_output:
    description: "Stream the full Claude execution output to the Actions log. WARNING: may expose secrets and sensitive code in public repos."
    required: false
    default: "false"

outputs:
  important:
    description: "Count of Important findings posted."
    value: ${{ steps.post.outputs.important }}
  nit:
    description: "Count of Nit findings posted."
    value: ${{ steps.post.outputs.nit }}

runs:
  using: "composite"
  steps:
    # 0) Capture the workflow token before claude-code-action's OIDC replaces it
    - id: save-token
      shell: bash
      run: |
        echo "::add-mask::$ORIGINAL_TOKEN"
        echo "token=$ORIGINAL_TOKEN" >> "$GITHUB_OUTPUT"
      env:
        ORIGINAL_TOKEN: ${{ inputs.github_token }}

    # 1) Generation pass — combined logic + security reviewer (single session)
    - id: review
      continue-on-error: true
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        show_full_output: ${{ inputs.show_full_output }}
        prompt: |
          You are reviewing PR #${{ github.event.pull_request.number }}
          in ${{ github.repository }} for correctness bugs AND security defects.
          Bias toward recall — surface anything that might be wrong or exploitable.
          A later verification step filters false positives.

          Read the PR diff and changed files. Look for:

          LOGIC: inverted conditions, off-by-one, null/undefined dereferences,
          swallowed errors, edge cases, inconsistent state on partial failure.

          SECURITY: SQL/command injection, authorization gaps, secret/PII exposure
          in logs, unsafe deserialization, SSRF, path traversal, unvalidated input
          from trust boundaries.

          For each candidate, emit ONE JSON object per line (JSONL):
          {"file":"<path>","line":<int>,"category":"logic|security","claim":"<one falsifiable sentence>","severity":"important|nit"}

          Rules:
          - line is the NEW-side line number (the + side of the diff)
          - category is "logic" for correctness bugs, "security" for security defects
          - claim must be specific and falsifiable — not vague ("might be unsafe")
          - For security: name the source, sink, and impact
          - Do NOT flag style, naming, formatting, missing tests, or defense-in-depth
          - Output ONLY JSONL lines — no prose, no markdown, no summary
        claude_args: >-
          --model ${{ inputs.model }}
          --max-turns 10
          --allowedTools "Read,Grep,Glob"

    # 2) Build the posting layer (dist/ is gitignored)
    - id: build
      shell: bash
      run: cd ${{ github.action_path }} && npm ci --ignore-scripts && npm run build

    # 3) Extract candidates from reviewer output
    - id: combine
      shell: bash
      run: node ${{ github.action_path }}/dist/main.cjs --extract-candidates
      env:
        LOGIC_OUTPUT_FILE: ${{ steps.review.outputs.execution_file }}

    # 4) Verification pass — dispatch finding-verifier for each candidate
    - id: verify
      if: steps.combine.outputs.candidate_count != '0'
      continue-on-error: true
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        show_full_output: ${{ inputs.show_full_output }}
        prompt: |
          You are verifying code review candidates for PR
          #${{ github.event.pull_request.number }} in ${{ github.repository }}.

          Here are the candidates to verify (one per line):
          ${{ steps.combine.outputs.candidates }}

          For EACH candidate above, use the Task tool to dispatch the
          "finding-verifier" subagent with that single candidate as input.
          Each candidate gets its own isolated Task call — do not batch.

          After ALL verifiers complete, collect their results and print
          ONLY a JSON array of the result objects. No prose, no markdown
          fences, no summary — just the raw JSON array.
        claude_args: >-
          --model ${{ inputs.model }}
          --max-turns ${{ inputs.max_turns }}
          --allowedTools "Read,Grep,Glob,Task"

    # 5) Deterministic posting layer
    - id: post
      if: steps.combine.outputs.candidate_count != '0'
      shell: bash
      run: node ${{ github.action_path }}/dist/main.cjs
      env:
        CCR_GITHUB_TOKEN: ${{ steps.save-token.outputs.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        VERIFIER_OUTPUT_FILE: ${{ steps.verify.outputs.execution_file }}
        SKIP_GLOBS: ${{ inputs.skip_globs }}
        CCR_IMPORTANT_THRESHOLD: ${{ inputs.important_threshold }}
        CCR_NIT_THRESHOLD: ${{ inputs.nit_threshold }}
        CCR_MAX_NITS: ${{ inputs.max_nits }}
        CCR_POST_PRE_EXISTING: ${{ inputs.post_pre_existing }}
        CCR_MODEL: ${{ inputs.model }}
        CCR_PRIOR_COST_USD: ${{ steps.combine.outputs.cost_usd }}
        CCR_PRIOR_DURATION_MS: ${{ steps.combine.outputs.duration_ms }}

    # 6) Post empty summary when no candidates found
    - id: post-empty
      if: steps.combine.outputs.candidate_count == '0'
      shell: bash
      run: node ${{ github.action_path }}/dist/main.cjs
      env:
        CCR_GITHUB_TOKEN: ${{ steps.save-token.outputs.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        SKIP_GLOBS: ${{ inputs.skip_globs }}
        CCR_MODEL: ${{ inputs.model }}
        CCR_PRIOR_COST_USD: ${{ steps.combine.outputs.cost_usd }}
        CCR_PRIOR_DURATION_MS: ${{ steps.combine.outputs.duration_ms }}
